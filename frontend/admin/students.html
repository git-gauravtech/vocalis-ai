<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Directory — Vocalis Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css" />
<script src="../js/auth.js"></script>
<style>
:root {
  --bg: #030305;
  --surface: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.6);
}

body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

/* ── BACKGROUND MESH ── */
.bg-mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.mesh-orb {
  position: absolute; border-radius: 50%; filter: blur(140px);
  animation: float 25s infinite alternate ease-in-out; opacity: 0.15;
}
.orb-1 { width: 60vw; height: 60vw; background: #312e81; top: -10%; left: -10%; }
.orb-2 { width: 50vw; height: 50vw; background: #1e1b4b; bottom: -10%; right: -10%; }

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, 30px) scale(1.1); }
}

.nav { background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); padding: 20px 48px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1px; text-decoration: none; color: #fff; }
.nav-logo span { color: var(--accent); }

.page { max-width: 1000px; margin: 60px auto; padding: 0 24px; }
.header { margin-bottom: 48px; }
.header h1 { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
.header p { color: var(--text-dim); font-size: 16px; font-weight: 300; }

.search-container { position: relative; margin-bottom: 32px; }
.search-bar {
  width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--border);
  border-radius: 18px; padding: 18px 24px; color: #fff; font-family: inherit;
  font-size: 15px; transition: all 0.3s;
}
.search-bar:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.05); box-shadow: 0 0 20px var(--accent-glow); }

.student-card {
  display: grid; grid-template-columns: auto 1fr auto auto;
  align-items: center; gap: 24px; padding: 20px 32px;
  background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border);
  border-radius: 24px; margin-bottom: 12px; transition: all 0.3s;
}
.student-card:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--accent); transform: translateX(5px); }

.student-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--border); }
.student-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 2px; }
.student-email { font-size: 12px; color: var(--text-dim); }

.stat-box { text-align: center; min-width: 80px; }
.stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
.stat-lab { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }

.date-box { font-size: 12px; color: var(--text-dim); font-weight: 300; min-width: 120px; text-align: right; }

.reveal { animation: fadeInUp 0.8s ease both; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="mesh-orb orb-1"></div>
  <div class="mesh-orb orb-2"></div>
</div>

<nav class="nav">
  <a href="/admin/dashboard.html" class="nav-logo">Voca<span>lis</span></a>
  <div class="nav-user">
    <img id="nav-avatar" class="nav-avatar" src="" alt="avatar" referrerpolicy="no-referrer" />
    <span id="nav-name" class="nav-name"></span>
    <a href="/admin/dashboard.html" class="btn btn-outline" style="padding:10px 20px; font-size:13px; border-radius:12px;">Analytics</a>
    <button class="btn btn-outline" onclick="logout()" style="padding:10px 20px; font-size:13px; border-radius:12px;">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="header reveal">
    <h1>Student Directory</h1>
    <p>Viewing registered students and their platform engagement.</p>
  </div>

  <div class="search-container reveal">
    <input class="search-bar" type="text" placeholder="Search by name or email..." id="search" oninput="filterStudents()" />
  </div>

  <div id="students-list"></div>
</div>

<script>
let allStudents = [];

document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth('admin');
  if (!user) return;
  populateNav(user);

  const res = await apiFetch('/admin/students');
  const data = await res.json();
  allStudents = data.students || [];
  renderStudents(allStudents);
});

function renderStudents(students) {
  const list = document.getElementById('students-list');
  if (!students.length) {
    list.innerHTML = '<div style="color:var(--text-dim); text-align:center; padding:100px;">No students match your search.</div>';
    return;
  }
  list.innerHTML = students.map((s, i) => `
    <div class="student-card reveal" style="animation-delay: ${i * 0.05}s">
      <img class="student-avatar" src="${s.picture || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(s.name)}" alt="avatar" referrerpolicy="no-referrer" />
      <div>
        <div class="student-name">${s.name}</div>
        <div class="student-email">${s.email}</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${s.interview_count}</div>
        <div class="stat-lab">Sessions</div>
      </div>
      <div class="date-box">Joined ${formatDate(s.created_at).split(',')[0]}</div>
    </div>`).join('');
}

function filterStudents() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allStudents.filter(s =>
    s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q)
  );
  renderStudents(filtered);
}
</script>
</body>
</html>
