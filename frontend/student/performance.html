<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Performance Intelligence — Vocalis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css" />
<script src="../js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #030305;
  --surface: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #6366f1;
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.6);
}

body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

.bg-mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.mesh-orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.15; animation: float 25s infinite alternate ease-in-out; }
.orb-1 { width: 60vw; height: 60vw; background: #312e81; top: -10%; left: -10%; }
.orb-2 { width: 50vw; height: 50vw; background: #1e1b4b; bottom: -10%; right: -10%; }

@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 30px) scale(1.1); } }

.nav { background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1px; text-decoration: none; color: #fff; }
.nav-logo span { color: var(--accent); }

.page { max-width: 1100px; margin: 60px auto; padding: 0 24px; }
.header { margin-bottom: 60px; text-align: center; }
.header h1 { font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 800; letter-spacing: -3px; margin-bottom: 12px; }
.header p { color: var(--text-dim); font-size: 18px; font-weight: 300; }

.chart-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 40px; padding: 48px; margin-bottom: 40px; }
.chart-container { height: 400px; position: relative; }

.insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
.insight-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 32px; padding: 40px; }
.insight-box h3 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 24px; }
.insight-list { list-style: none; }
.insight-list li { margin-bottom: 16px; font-size: 15px; color: var(--text-dim); display: flex; align-items: flex-start; gap: 12px; }
.insight-list li::before { content: '→'; color: var(--accent); font-weight: bold; }

.stat-pill-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 40px; }
.stat-pill { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; }
.stat-pill span { color: var(--accent); font-weight: 700; margin-right: 6px; }

.back-link { display: inline-block; margin-top: 60px; color: var(--text-dim); text-decoration: none; font-size: 14px; transition: 0.3s; }
.back-link:hover { color: #fff; transform: translateX(-5px); }

.reveal { animation: fadeInUp 0.8s ease both; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

/* ── RESPONSIVE DESIGN ── */
@media (max-width: 768px) {
  .nav { padding: 15px 20px; flex-direction: column; gap: 15px; }
  .page { padding: 40px 15px; }
  .insights-grid { grid-template-columns: 1fr; }
  .stat-pill-row { flex-direction: column; gap: 10px; }
  .stat-pill { text-align: center; }
  .chart-container { height: auto; min-height: 250px; }
}
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="mesh-orb orb-1"></div>
  <div class="mesh-orb orb-2"></div>
</div>

<nav class="nav">
  <a href="/student/dashboard.html" class="nav-logo">Voca<span>lis</span></a>
  <a href="/student/dashboard.html" class="btn btn-outline" style="padding:10px 20px; font-size:13px; border-radius:12px;">Back to Dashboard</a>
</nav>

<div class="page">
  <div class="header reveal">
    <h1>Performance Intelligence</h1>
    <p>A synthesized view of your interview readiness and behavioral growth.</p>
  </div>

  <div class="stat-pill-row reveal">
    <div class="stat-pill"><span id="total-sessions">0</span> Sessions</div>
    <div class="stat-pill"><span id="avg-rating">0.0</span> Avg Rating</div>
    <div class="stat-pill"><span id="readiness-level">Calculating...</span> Readiness</div>
  </div>

  <div class="chart-card reveal">
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <div class="insights-grid">
    <div class="insight-box reveal">
      <h3>Verified Strengths</h3>
      <ul id="strengths-list" class="insight-list"></ul>
    </div>
    <div class="insight-box reveal" style="animation-delay: 0.2s">
      <h3>Growth Priorities</h3>
      <ul id="weaknesses-list" class="insight-list"></ul>
    </div>
  </div>

  <div style="text-align: center;">
    <a href="/student/dashboard.html" class="back-link">&larr; Return to Dashboard</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = requireAuth('student');
  if (!user) return;

  const res = await apiFetch('/interview/history');
  const data = await res.json();
  const interviews = data.interviews || [];
  const completed = interviews.filter(i => i.status === 'completed').reverse();

  if (!completed.length) {
    document.querySelector('.page').innerHTML = `
      <div style="text-align:center; padding:100px;">
        <h2 style="font-family:Syne; margin-bottom:20px;">No Performance Data Yet</h2>
        <p style="color:var(--text-dim); margin-bottom:40px;">Complete at least one interview session to see your intelligence synthesis.</p>
        <a href="/student/setup.html" class="btn btn-primary">Start First Session</a>
      </div>
    `;
    return;
  }

  // Update Stats
  document.getElementById('total-sessions').textContent = completed.length;
  const avg = (completed.reduce((s, i) => s + (i.feedback.overall_score), 0) / completed.length).toFixed(1);
  document.getElementById('avg-rating').textContent = avg;
  
  let readiness = "Developing";
  if (avg >= 8) readiness = "Elite";
  else if (avg >= 6.5) readiness = "Strong";
  document.getElementById('readiness-level').textContent = readiness;

  // Render Chart
  const labels = completed.map(i => formatDate(i.created_at).split(',')[0]);
  const scores = completed.map(i => i.feedback.overall_score);

  const ctx = document.getElementById('mainChart').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'Rating',
        data: scores,
        borderColor: '#6366f1',
        borderWidth: 4,
        backgroundColor: 'rgba(99, 102, 241, 0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#fff',
        pointBorderColor: '#6366f1',
        pointBorderWidth: 3,
        pointRadius: 6,
        pointHoverRadius: 8
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: 10, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 12 } } },
        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 12 } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111',
          titleFont: { family: 'Syne', size: 14 },
          bodyFont: { family: 'Outfit', size: 14 },
          padding: 16,
          displayColors: false
        }
      }
    }
  });

  // Extract common strengths/weaknesses
  const strengths = [];
  const weaknesses = [];
  completed.forEach(i => {
    if (i.feedback.strengths) strengths.push(...i.feedback.strengths);
    if (i.feedback.weaknesses) weaknesses.push(...i.feedback.weaknesses);
  });

  const uniqueStrengths = [...new Set(strengths)].slice(0, 6);
  const uniqueWeaknesses = [...new Set(weaknesses)].slice(0, 6);

  document.getElementById('strengths-list').innerHTML = uniqueStrengths.map(s => `<li>${s}</li>`).join('');
  document.getElementById('weaknesses-list').innerHTML = uniqueWeaknesses.map(w => `<li>${w}</li>`).join('');
});
</script>

</body>
</html>
