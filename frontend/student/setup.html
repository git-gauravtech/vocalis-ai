<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Setup Interview — Vocalis</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="../js/auth.js"></script>
<style>
.setup-wrap { max-width: 680px; margin: 0 auto; padding: 40px 24px; }
.setup-header { margin-bottom: 36px; }
.setup-header h1 { font-size: 36px; margin-bottom: 8px; }
.setup-header p { color: var(--text2); }
.setup-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 36px;
}
.form-section { margin-bottom: 28px; }
.form-section:last-child { margin-bottom: 0; }
.section-sep { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
.file-chosen {
  display: flex; align-items: center; gap: 12px;
  background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
  border-radius: var(--radius); padding: 14px 18px; margin-top: 12px;
}
.file-chosen .file-name { font-weight: 500; color: var(--green); flex: 1; }
.file-chosen button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; }
.submit-row { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }

/* ── RESPONSIVE DESIGN ── */
@media (max-width: 600px) {
  .setup-wrap { padding: 20px 15px; }
  .setup-card { padding: 20px; }
  .submit-row { flex-direction: column; }
  .submit-row button { width: 100%; }
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/student/dashboard.html" class="nav-logo">Voca<span>lis</span></a>
  <div class="nav-user">
    <img id="nav-avatar" class="nav-avatar" src="" alt="avatar" referrerpolicy="no-referrer" />
    <span id="nav-name" class="nav-name"></span>
    <button class="btn btn-outline" onclick="logout()" style="padding:8px 14px;font-size:13px;">Logout</button>
  </div>
</nav>

<div class="setup-wrap">
  <div class="setup-header reveal">
    <h1>Setup Your Interview</h1>
    <p>Upload your resume and configure your interview preferences below.</p>
  </div>

  <div class="setup-card reveal delay-1">
    <!-- RESUME UPLOAD -->
    <div class="form-section">
      <div class="form-label" style="margin-bottom:12px;">Resume (PDF only)</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('resume-input').click()">
        <div class="upload-icon">📄</div>
        <p>Drag & drop your resume here or <span>click to browse</span></p>
        <p style="font-size:13px;margin-top:6px;color:var(--text3)">PDF files only · Max 5MB</p>
      </div>
      <input type="file" id="resume-input" accept=".pdf" style="display:none" />
      <div id="file-chosen" style="display:none" class="file-chosen">
        <span>✅</span>
        <span class="file-name" id="file-name-text"></span>
        <button onclick="clearFile()">✕</button>
      </div>
    </div>

    <hr class="section-sep" />

    <!-- COMPANY & ROLE -->
    <div class="form-section">
      <div class="form-label" style="margin-bottom:16px;">Target Company & Role <span style="color:var(--text3)">(Optional)</span></div>
      <div class="grid-2" style="gap:16px;">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input class="form-input" id="company" type="text" placeholder="e.g. Google, Amazon, Startup..." />
        </div>
        <div class="form-group">
          <label class="form-label">Role / Position</label>
          <input class="form-input" id="role" type="text" placeholder="e.g. Software Engineer, PM..." />
        </div>
      </div>
    </div>

    <hr class="section-sep" />

    <!-- INTERVIEW TYPE -->
    <div class="form-section">
      <div class="form-label" style="margin-bottom:12px;">Interview Type</div>
      <div class="option-group">
        <button class="option-btn" data-val="technical" onclick="selectType(this)">💻 Technical</button>
        <button class="option-btn" data-val="hr" onclick="selectType(this)">🤝 HR / Behavioral</button>
        <button class="option-btn active" data-val="both" onclick="selectType(this)">🔁 Both</button>
      </div>
    </div>

    <hr class="section-sep" />

    <!-- SUBMIT -->
    <div class="submit-row">
      <a href="/student/dashboard.html" class="btn btn-outline">Cancel</a>
      <button class="btn btn-primary btn-lg" id="start-btn" onclick="startInterview()" disabled>
        <span id="btn-text">Start Interview →</span>
        <span id="btn-spinner" class="spinner" style="display:none;width:16px;height:16px;"></span>
      </button>
    </div>
  </div>
</div>

<script>
let selectedType = 'both';
let selectedFile = null;

document.addEventListener('DOMContentLoaded', () => {
  const user = requireAuth('student');
  if (!user) return;
  populateNav(user);
  setupDragDrop();
});

function selectType(btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.val;
}

document.getElementById('resume-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) setFile(file);
});

function setFile(file) {
  if (!file.name.endsWith('.pdf')) { showToast('Please upload a PDF file', 'error'); return; }
  if (file.size > 5 * 1024 * 1024) { showToast('File too large (max 5MB)', 'error'); return; }
  selectedFile = file;
  document.getElementById('file-name-text').textContent = file.name;
  document.getElementById('file-chosen').style.display = 'flex';
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('start-btn').disabled = false;
}

function clearFile() {
  selectedFile = null;
  document.getElementById('resume-input').value = '';
  document.getElementById('file-chosen').style.display = 'none';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('start-btn').disabled = true;
}

function setupDragDrop() {
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) setFile(file);
  });
}

async function startInterview() {
  if (!selectedFile) { showToast('Please upload your resume', 'error'); return; }

  const btn = document.getElementById('start-btn');
  document.getElementById('btn-text').textContent = 'Processing...';
  document.getElementById('btn-spinner').style.display = 'block';
  btn.disabled = true;

  const formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('company', document.getElementById('company').value.trim());
  formData.append('role', document.getElementById('role').value.trim());
  formData.append('interview_type', selectedType);

  try {
    const res = await apiFetch('/interview/upload-resume', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.interview_id) {
      window.location.href = `/student/interview.html?id=${data.interview_id}`;
    } else {
      throw new Error(data.detail || 'Upload failed');
    }
  } catch (e) {
    showToast(e.message || 'Something went wrong', 'error');
    document.getElementById('btn-text').textContent = 'Start Interview →';
    document.getElementById('btn-spinner').style.display = 'none';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
