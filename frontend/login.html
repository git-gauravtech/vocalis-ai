<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Vocalis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="js/auth.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #030305;
  --surface: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --text: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── ANIMATED BACKGROUND ── */
.bg-mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.mesh-orb {
  position: absolute; border-radius: 50%; filter: blur(140px);
  animation: float 25s infinite alternate ease-in-out; opacity: 0.25;
}
.orb-1 { width: 60vw; height: 60vw; background: #312e81; top: -10%; left: -10%; }
.orb-2 { width: 50vw; height: 50vw; background: #1e1b4b; bottom: -10%; right: -10%; }

@keyframes float {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, 30px) scale(1.1); }
}

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 30px 6vw;
}
.logo {
  font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800;
  text-decoration: none; color: var(--text); letter-spacing: -1px;
}
.logo span { color: var(--accent); }
.back-btn {
  font-size: 13px; font-weight: 600; color: var(--text-dim); text-decoration: none;
  transition: color 0.3s;
}
.back-btn:hover { color: #fff; }

/* ── MAIN ── */
.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

.login-card {
  width: 100%; max-width: 460px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--border);
  border-radius: 32px; padding: 60px 40px;
  backdrop-filter: blur(40px);
  box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
  text-align: center;
}

.card-logo { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1.5px; }
.card-logo span { color: var(--accent); }
.card-tagline { color: var(--text-dim); font-size: 15px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }

.divider-row { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; font-weight: 600; }

.google-wrap { display: flex; justify-content: center; margin-bottom: 30px; }

.login-note { font-size: 11px; color: var(--text-dim); line-height: 1.8; font-weight: 300; }
.login-note a { color: var(--accent); text-decoration: none; font-weight: 500; }

/* ── BOTTOM ── */
footer { padding: 40px; display: flex; gap: 30px; justify-content: center; font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="mesh-orb orb-1"></div>
  <div class="mesh-orb orb-2"></div>
</div>

<div class="top-bar">
  <a href="/" class="logo">Voca<span>lis</span></a>
  <a href="/" class="back-btn">← Back to methodology</a>
</div>

<div class="main">
  <div class="login-card">
    <div class="card-logo">Voca<span>lis</span></div>
    <p class="card-tagline">Welcome to the future of interview preparation. Sign in to access your dashboard.</p>
    
    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-text">AUTHENTICATE</div>
      <div class="divider-line"></div>
    </div>

    <!-- Google Sign In -->
    <div id="g_id_onload"
      data-client_id="710790601928-04v7d1kvaao0311agvifb2997103e4em.apps.googleusercontent.com"
      data-callback="handleGoogleCredential"
      data-auto_prompt="false">
    </div>
    <div class="google-wrap">
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="filled_black"
        data-text="continue_with"
        data-shape="rectangular"
        data-logo_alignment="left"
        data-width="340">
      </div>
    </div>

    <p class="login-note">
      Secure authentication provided by Google Cloud.<br>
      By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy</a>.
    </p>
  </div>
</div>

<footer>
  <span>🔒 256-bit Encryption</span>
  <span>✅ No credit card required</span>
  <span>⚡ Instant Setup</span>
</footer>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  const token = getToken();
  if (user && token) {
    window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
  }
});
</script>
</body>
</html>
