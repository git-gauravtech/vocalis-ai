<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Vocalis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --text-dim: #5c534c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Bricolage Grotesque', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Animations removed */

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 30px 6vw;
}
.logo {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 24px; font-weight: 800;
  text-decoration: none; color: var(--text); letter-spacing: -1px;
  display: flex; align-items: center; gap: 8px;
}
.logo span { color: var(--accent); }
.back-btn {
  font-size: 13px; font-weight: 600; color: var(--text-dim); text-decoration: none;
  transition: color 0.3s;
}
.back-btn:hover { color: var(--text); }

/* ── MAIN ── */
.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }

.login-card {
  width: 100%; max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 32px; padding: 60px 40px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.02);
  text-align: center;
}

.card-logo { font-family: 'Bricolage Grotesque', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1.5px; }
.card-logo span { color: var(--accent); }
.card-tagline { color: var(--text-dim); font-size: 15px; line-height: 1.6; margin-bottom: 40px; font-weight: 300; }

.divider-row { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; font-weight: 600; }

.google-wrap { display: flex; justify-content: center; margin-bottom: 30px; }

.login-note { font-size: 11px; color: var(--text-dim); line-height: 1.8; font-weight: 300; }
.login-note a { color: var(--accent); text-decoration: none; font-weight: 500; }

/* ── BOTTOM ── */
footer { padding: 40px; display: flex; gap: 30px; justify-content: center; font-size: 12px; color: var(--text-dim); }

/* ── RESPONSIVE DESIGN ── */
@media (max-width: 480px) {
  .login-card { padding: 40px 20px; }
  .top-bar { padding: 20px 24px; flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>



<div class="top-bar">
  <a href="/" class="logo"><img src="/assets/logo.svg" alt="Logo" width="28" height="28" />Voca<span>lis</span></a>
  <a href="/" class="back-btn">← Back to methodology</a>
</div>

<div class="main">
  <div class="login-card">
    <div class="card-logo" style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px;"><img src="/assets/logo.svg" alt="Logo" width="36" height="36" />Voca<span>lis</span></div>
    <p class="card-tagline">Welcome to the future of interview preparation. Sign in to access your dashboard.</p>
    
    <div class="divider-row">
      <div class="divider-line"></div>
      <div class="divider-text">AUTHENTICATE</div>
      <div class="divider-line"></div>
    </div>

    <!-- Google Sign In -->
    <div id="g_id_onload"
      data-client_id="710790601928-04v7d1kvaao0311agvifb2997103e4em.apps.googleusercontent.com"
      data-callback="handleGoogleCredential"
      data-auto_prompt="false">
    </div>
    <div class="google-wrap">
      <div class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="continue_with"
        data-shape="rectangular"
        data-logo_alignment="left"
        data-width="340">
      </div>
    </div>

    <p class="login-note">
      Secure authentication provided by Google Cloud.<br>
      By continuing, you agree to our <a href="#">Terms</a> & <a href="#">Privacy</a>.
    </p>
  </div>
</div>

<footer>
  <span>🔒 256-bit Encryption</span>
  <span>✅ No credit card required</span>
  <span>⚡ Instant Setup</span>
</footer>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  const token = getToken();
  if (user && token) {
    window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
  }
});
</script>
</body>
</html>
