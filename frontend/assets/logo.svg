<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Warm Terracotta Gradient -->
    <linearGradient id="warmGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#be5332" />
      <stop offset="60%" stop-color="#d96c4a" />
      <stop offset="100%" stop-color="#e89c83" />
    </linearGradient>
    
    <!-- Accent Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5ba8f" />
      <stop offset="100%" stop-color="#d4a373" />
    </linearGradient>
    
    <!-- Subtle Drop Shadow for Premium Depth -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2b2622" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Ambient Glow Ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#warmGrad)" stroke-width="1.5" opacity="0.12" />
  
  <!-- Outer Dotted Sound Ring representing acoustics and AI nodes -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#e2dcd2" stroke-width="2" stroke-dasharray="2 6" />

  <!-- Brand Motif: Letter 'V' Interwoven with Organic Soundwaves -->
  <g filter="url(#subtle-shadow)">
    <!-- Left Wing of 'V' (Terracotta Wave Shape) -->
    <path d="M 28 26 C 36 26, 40 45, 46 72 C 40 72, 32 50, 28 26 Z" fill="url(#warmGrad)" />
    
    <!-- Right Wing of 'V' (Terracotta Wave Shape) -->
    <path d="M 72 26 C 64 26, 60 45, 54 72 C 60 72, 68 50, 72 26 Z" fill="url(#warmGrad)" />
    
    <!-- Central Vocal Core (Gold Pillar representing the voice capture) -->
    <path d="M 50 16 V 84" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Secondary Equalizer Bars -->
    <path d="M 43 28 V 64" stroke="url(#warmGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    <path d="M 57 28 V 64" stroke="url(#warmGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8" />
    
    <!-- Tertiary Acoustic Wave Bars -->
    <path d="M 36 38 V 54" stroke="#d1c8ba" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 64 38 V 54" stroke="#d1c8ba" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
